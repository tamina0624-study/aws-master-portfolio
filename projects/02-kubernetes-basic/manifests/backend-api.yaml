apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: echo-server
        image: hashicorp/http-echo  # 指定した文字を返すだけの便利な軽量イメージ
        # --- ここを追加 ---
        livenessProbe:
          tcpSocket:          # HTTPパスがない場合はポートの疎通確認でもOK
            port: 5678
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 5678
          initialDelaySeconds: 5
          periodSeconds: 10
        args:
          - "-text=Hello API! This is the Backend Service."
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678

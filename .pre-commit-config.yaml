repos:
  # =========================
  # ■ Secret Detection (最重要)
  # =========================
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ["--verbose", "--redact"]

  # =========================
  # ■ Basic Safety Checks
  # =========================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # =========================
  # ■ Prevent committing .env accidentally
  # =========================
  - repo: local
    hooks:
      - id: block-env-files
        name: Block .env files
        entry: py block_env.py
        language: system

  # =========================
  # ■ Prevent committing Secret folders
  # =========================
      - id: block-secret-folder
        name: Block Secret folders
        entry: py block_secret.py
        language: system

  # =========================
  # ■ 個人メール検知（強め）
  # =========================
      - id: block-personal-email
        name: Block personal email
        entry: py block_personal_email.py
        language: system

  # =========================
  # ■ 自分の名前（ローカル専用）
  # =========================
      - id: block-my-name
        name: Block my name
        entry: py block_my_name.py
        language: system

  # =========================
  # ■ 会社名
  # =========================
      - id: block-company
        name: Block company name
        entry: py block_company.py
        language: system

  # =========================
  # ■ Windowsパス検知
  # =========================
      - id: block-windows-path
        name: Block local path
        entry: py block_windows_path.py
        language: system

  # =========================
  # ■ ログ集約・重複排除
  # =========================
      - id: block-log-aggregator
        name: Block log aggregator
        entry: py block_log_aggregator.py
        language: system

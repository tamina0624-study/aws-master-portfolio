# app1-service.yaml (例: フロントエンド)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# app2-service.yaml (例: バックエンド/API)
apiVersion: v1
kind: Service
metadata:
  name: backend-service2
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80